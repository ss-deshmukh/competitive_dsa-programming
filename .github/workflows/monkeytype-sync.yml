name: MonkeyType Sync

on:
  schedule:
    - cron: "30 23 * * *"   # Runs daily at 11:30 PM UTC
  workflow_dispatch:          # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and save MonkeyType results
        env:
          MONKEYTYPE_API_KEY: ${{ secrets.MONKEYTYPE_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone, timedelta

          api_key = os.environ["MONKEYTYPE_API_KEY"]
          today_utc = datetime.now(timezone.utc).date()

          # Fetch last 50 results (enough to find today's 50-word tests)
          url = "https://api.monkeytype.com/results?limit=50"
          req = urllib.request.Request(
              url,
              headers={"Authorization": f"ApeKey {api_key}"}
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"API error {e.code}: {e.read().decode()}")
              raise

          results = data.get("data", [])

          # Filter: mode=words, mode2=50, from today (UTC)
          today_results = []
          for r in results:
              ts_ms = r.get("timestamp", 0)
              result_date = datetime.fromtimestamp(ts_ms / 1000, tz=timezone.utc).date()
              if result_date == today_utc and r.get("mode") == "words" and str(r.get("mode2", "")) == "50":
                  today_results.append(r)

          if not today_results:
              print(f"No 50-word MonkeyType results found for today ({today_utc}). Skipping commit.")
              exit(0)

          # Use the best WPM result from today
          best = max(today_results, key=lambda r: r.get("wpm", 0))

          def fmt(val, decimals=2):
              return f"{val:.{decimals}f}" if isinstance(val, float) else str(val)

          wpm         = best.get("wpm", "N/A")
          raw_wpm     = best.get("rawWpm", "N/A")
          acc         = best.get("acc", "N/A")
          consistency = best.get("consistency", "N/A")
          duration    = best.get("testDuration", "N/A")
          language    = best.get("language", "english")
          is_pb       = best.get("isPb", False)
          char_stats  = best.get("charStats", [])
          result_id   = best.get("_id", "")
          ts_ms       = best.get("timestamp", 0)
          result_time = datetime.fromtimestamp(ts_ms / 1000, tz=timezone.utc).strftime("%H:%M UTC")

          # charStats: [correct, incorrect, extra, missed]
          correct   = char_stats[0] if len(char_stats) > 0 else "N/A"
          incorrect = char_stats[1] if len(char_stats) > 1 else "N/A"
          extra     = char_stats[2] if len(char_stats) > 2 else "N/A"
          missed    = char_stats[3] if len(char_stats) > 3 else "N/A"

          pb_badge = " 🏆 Personal Best" if is_pb else ""
          date_str = str(today_utc)

          md = f"""# MonkeyType — {date_str}{pb_badge}

          ## Stats (50 Words · {language})

          | Metric        | Value                  |
          |---------------|------------------------|
          | WPM           | {fmt(wpm)} wpm         |
          | Raw WPM       | {fmt(raw_wpm)} wpm     |
          | Accuracy      | {fmt(acc)}%            |
          | Consistency   | {fmt(consistency)}%    |
          | Duration      | {fmt(duration, 1)}s    |
          | Time          | {result_time}          |

          ## Character Breakdown

          | Type      | Count     |
          |-----------|-----------|
          | Correct   | {correct} |
          | Incorrect | {incorrect} |
          | Extra     | {extra}   |
          | Missed    | {missed}  |

          ---
          *{len(today_results)} attempt(s) today — best result shown*
          """

          # Strip leading whitespace from heredoc indentation
          md = "\n".join(line.lstrip("          ") for line in md.splitlines()) + "\n"

          # Write file: monkeytype/YYYY/MM/YYYY-MM-DD.md
          year  = today_utc.strftime("%Y")
          month = today_utc.strftime("%m")
          out_dir = f"monkeytype/{year}/{month}"
          os.makedirs(out_dir, exist_ok=True)
          out_path = f"{out_dir}/{date_str}.md"

          with open(out_path, "w") as f:
              f.write(md)

          print(f"Written: {out_path}")
          print(f"WPM: {wpm}, Accuracy: {acc}%, Consistency: {consistency}%")
          EOF

      - name: Commit and push MonkeyType result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monkeytype/
          if git diff --cached --quiet; then
            echo "No new MonkeyType results to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "Sync MonkeyType result - ${DATE}"
            git push
          fi
